name: Scarily TicTacToe Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    env:
      # Memaksa penggunaan Node.js 24 agar tidak deprecated
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # PERBAIKAN: Rename dan pindah file ke root agar path simpel
      - name: Prepare APK Artifact
        run: |
          mkdir -p apk_output
          cp app/build/outputs/apk/debug/app-debug.apk ./TicTacToe.apk
        # Baris di atas menyalin APK hasil build dan mengubah namanya jadi TicTacToe.apk di folder utama

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scarily-TicTacToe-APK
          path: TicTacToe.apk
