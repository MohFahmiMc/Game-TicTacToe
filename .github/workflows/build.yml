name: Scarily TicTacToe Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1

      # TAMBAHKAN INI BIAR GAK PERMISSION DENIED
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Prepare APK Artifact
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk ./TicTacToe.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scarily-TicTacToe-APK
          path: TicTacToe.apk
